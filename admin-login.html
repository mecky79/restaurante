<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Bakes and Bites</title>
  <link rel="stylesheet" href="body.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: rgba(30, 12, 3, 0.85);
      border: 1.5px solid var(--gold);
      border-radius: 20px;
      padding: 44px 36px;
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.6s ease both;
      position: relative;
      z-index: 1;
    }

    .login-icon { font-size: 2.8rem; }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .login-sub {
      font-size: 0.85rem;
      color: rgba(253,240,220,0.45);
      text-align: center;
      letter-spacing: 0.04em;
      margin-top: -10px;
    }

    .login-field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-field label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .login-field input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1.5px solid rgba(232,168,56,0.3);
      background: rgba(255,248,235,0.07);
      color: var(--text-light);
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      outline: none;
      letter-spacing: 0.12em;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .login-field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(232,168,56,0.18);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, var(--brown-mid), var(--brown-light), var(--brown-mid));
      color: var(--cream);
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 2px solid var(--gold);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      margin-top: 4px;
    }

    .login-btn:hover {
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
      color: var(--brown-dark);
      transform: translateY(-2px);
    }

    .login-error {
      color: #e74c3c;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
      animation: fadeUp 0.2s ease;
    }

    .login-attempts {
      font-size: 0.75rem;
      color: rgba(253,240,220,0.3);
      text-align: center;
    }

    .login-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto;
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <div class="login-card" id="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">Admin Access</div>
    <p class="login-sub">Bakes and Bites — Staff Only</p>
    <div class="login-divider"></div>

    <div class="login-field">
      <label for="admin-pass">Password</label>
      <input
        type="password"
        id="admin-pass"
        placeholder="Enter admin password"
        autocomplete="off"
        autofocus
      >
    </div>

    <div class="login-error" id="login-error"></div>

    <button class="login-btn" id="login-btn">Enter Dashboard</button>

    <p class="login-attempts" id="attempts-text"></p>
  </div>

  <script>
    // ── Password config ────────────────────────────────────────────────────
    // The actual password is: BakesAdmin2026
    // Stored below as a SHA-256 hash — the plain text never appears in code.
    // To change the password, generate a new SHA-256 hash and replace below.
    // Free tool: https://emn178.github.io/online-tools/sha256.html
    const CORRECT_HASH = 'e1ca04631e2e1c325ec385ca8104fc7d21c7aa437bfa837787cc75ea2dca0b21 ';

    // Session duration in milliseconds (8 hours)
    const SESSION_DURATION = 8 * 60 * 60 * 1000;

    // Max failed attempts before lockout
    const MAX_ATTEMPTS = 10;
    const LOCKOUT_DURATION = 1 * 60 * 1000; // 1 minute

    // ── Check if already authenticated ────────────────────────────────────
    const session = JSON.parse(sessionStorage.getItem('bb_admin_session') || 'null');
    if (session && (Date.now() - session.time) < SESSION_DURATION) {
      window.location.replace('admin.html');
    }

    // ── Check lockout ─────────────────────────────────────────────────────
    function getLockout() {
      return JSON.parse(localStorage.getItem('bb_admin_lockout') || 'null');
    }
    function setLockout(data) {
      localStorage.setItem('bb_admin_lockout', JSON.stringify(data));
    }

    function checkLockout() {
      const lockout = getLockout();
      if (!lockout) return false;
      const elapsed = Date.now() - lockout.time;
      if (elapsed < LOCKOUT_DURATION) {
        const remaining = Math.ceil((LOCKOUT_DURATION - elapsed) / 60000);
        showError(`Too many attempts. Try again in ${remaining} minute${remaining > 1 ? 's' : ''}.`);
        document.getElementById('login-btn').disabled = true;
        document.getElementById('admin-pass').disabled = true;
        return true;
      }
      // Lockout expired — clear it
      localStorage.removeItem('bb_admin_lockout');
      return false;
    }

    // ── SHA-256 hashing via Web Crypto API ────────────────────────────────
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray  = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ── UI helpers ────────────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
    }

    function updateAttemptsText(attempts) {
      const el = document.getElementById('attempts-text');
      if (attempts > 0) {
        const left = MAX_ATTEMPTS - attempts;
        el.textContent = `${left} attempt${left !== 1 ? 's' : ''} remaining before lockout`;
      } else {
        el.textContent = '';
      }
    }

    // ── Login logic ───────────────────────────────────────────────────────
    async function attemptLogin() {
      if (checkLockout()) return;

      const input = document.getElementById('admin-pass').value;
      if (!input) { showError('Please enter the password.'); return; }

      const hash = await sha256(input);

      if (hash === CORRECT_HASH) {
        // Success — set session and redirect
        sessionStorage.setItem('bb_admin_session', JSON.stringify({ time: Date.now() }));
        localStorage.removeItem('bb_admin_lockout');
        showError('');
        document.getElementById('login-btn').textContent = '✅ Redirecting...';
        setTimeout(() => window.location.replace('admin.html'), 400);
      } else {
        // Failed attempt
        const lockout  = getLockout() || { attempts: 0, time: Date.now() };
        lockout.attempts += 1;
        lockout.time      = Date.now();
        setLockout(lockout);

        if (lockout.attempts >= MAX_ATTEMPTS) {
          showError('Too many failed attempts. Locked out for 10 minutes.');
          document.getElementById('login-btn').disabled = true;
          document.getElementById('admin-pass').disabled = true;
        } else {
          updateAttemptsText(lockout.attempts);
          showError('Incorrect password. Please try again.');
          const card = document.getElementById('login-card');
          card.classList.remove('shake');
          void card.offsetWidth; // force reflow
          card.classList.add('shake');
          document.getElementById('admin-pass').value = '';
          document.getElementById('admin-pass').focus();
        }
      }
    }

    // ── Event listeners ───────────────────────────────────────────────────
    document.getElementById('login-btn').addEventListener('click', attemptLogin);
    document.getElementById('admin-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptLogin();
    });

    // Check lockout on load
    checkLockout();
    const existing = getLockout();
    if (existing) updateAttemptsText(existing.attempts);
  </script>
</body>
</html>
